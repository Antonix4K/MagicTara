<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Santuario - Sudoku </title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #020617; color: white; text-align: center; }
        header { background: #1e293b; padding: 20px; border-bottom: 3px solid #1abc9c; position: relative; }
        .nav-back { position: absolute; top: 25px; left: 20px; color: #1abc9c; text-decoration: none; font-weight: bold; }
        
        .game-container { max-width: 900px; margin: 20px auto; padding: 20px; }
        .loading-status { color: #f1c40f; font-size: 14px; height: 20px; margin-bottom: 10px; }

        .grid-layout {
            display: grid;
            grid-template-columns: 100px 200px 200px 200px;
            grid-template-rows: 100px 200px 200px 200px;
            gap: 15px; justify-content: center;
        }

        .label { 
            display: flex; align-items: center; justify-content: center; 
            background: #1e293b; border: 2px solid #334155; border-radius: 12px;
            color: #1abc9c; font-weight: bold; font-size: 13px; padding: 5px;
        }

        .slot { 
            background: #0f172a; border: 2px dashed #334155; border-radius: 12px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .slot:hover { border-color: #1abc9c; background: #1e293b; }
        .slot.correct { border: 2px solid #2ecc71; cursor: default; }
        .slot img { width: 100%; height: 100%; object-fit: cover; animation: fadeIn 0.5s; }

        .btn-refresh { 
            margin-top: 30px; background: #1abc9c; color: #020617; border: none; 
            padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="nav-back">← Volver</a>
    <h1>Sudoku (Auto)</h1>
</header>

<div class="game-container">
    <div id="status" class="loading-status"></div>
    <div class="grid-layout" id="board">
        <div style="visibility: hidden;"></div>
        <div class="label" id="col-0">?</div>
        <div class="label" id="col-1">?</div>
        <div class="label" id="col-2">?</div>

        <div class="label" id="row-0">?</div>
        <div id="cell-0-0" class="slot" onclick="validarCarta(0,0)"></div>
        <div id="cell-0-1" class="slot" onclick="validarCarta(0,1)"></div>
        <div id="cell-0-2" class="slot" onclick="validarCarta(0,2)"></div>

        <div class="label" id="row-1">?</div>
        <div id="cell-1-0" class="slot" onclick="validarCarta(1,0)"></div>
        <div id="cell-1-1" class="slot" onclick="validarCarta(1,1)"></div>
        <div id="cell-1-2" class="slot" onclick="validarCarta(1,2)"></div>

        <div class="label" id="row-2">?</div>
        <div id="cell-2-0" class="slot" onclick="preguntar(2,0)"></div> <div id="cell-2-0" class="slot" onclick="validarCarta(2,0)"></div>
        <div id="cell-2-1" class="slot" onclick="validarCarta(2,1)"></div>
        <div id="cell-2-2" class="slot" onclick="validarCarta(2,2)"></div>
    </div>
    <button class="btn-refresh" onclick="nuevoJuego()">Nuevo Tablero Aleatorio</button>
</div>

<script>
    const condiciones = [
        { t: "Color: Verde", cat: "colors", v: "G" },
        { t: "Color: Blanco", cat: "colors", v: "W" },
        { t: "Color: Negro", cat: "colors", v: "B" },
        { t: "Color: Rojo", cat: "colors", v: "R" },
        { t: "Color: Azul", cat: "colors", v: "U" },
        { t: "Tipo: Criatura", cat: "type_line", v: "Creature" },
        { t: "Tipo: Artefacto", cat: "type_line", v: "Artifact" },
        { t: "Tipo: Hechizo", cat: "type_line", v: "Instant" },
        { t: "Legendaria", cat: "type_line", v: "Legendary" }
    ];

    let filas = [], columnas = [];

    function nuevoJuego() {
        const shuffle = [...condiciones].sort(() => 0.5 - Math.random());
        filas = [shuffle[0], shuffle[1], shuffle[2]];
        columnas = [shuffle[3], shuffle[4], shuffle[5]];

        for(let i=0; i<3; i++) {
            document.getElementById(`row-${i}`).innerText = filas[i].t;
            document.getElementById(`col-${i}`).innerText = columnas[i].t;
            for(let j=0; j<3; j++) {
                let c = document.getElementById(`cell-${i}-${j}`);
                c.innerHTML = ""; c.className = "slot";
            }
        }
    }

    async function validarCarta(r, c) {
        const celda = document.getElementById(`cell-${r}-${c}`);
        if (celda.classList.contains('correct')) return;

        const nombre = prompt(`Introduce el nombre de la carta para:\n- ${filas[r].t}\n- ${columnas[c].t}`);
        if (!nombre) return;

        document.getElementById('status').innerText = "Consultando con Scryfall...";

        try {
            // Buscamos la carta en la API de Scryfall
            const response = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(nombre)}`);
            const data = await response.json();

            if (data.status === 404) {
                alert("Carta no encontrada en la base de datos de Magic.");
            } else {
                // Verificamos condiciones
                const cumpleFila = verificar(data, filas[r]);
                const cumpleCol = verificar(data, columnas[c]);

                if (cumpleFila && cumpleCol) {
                    celda.innerHTML = `<img src="${data.image_uris.normal}">`;
                    celda.classList.add('correct');
                    document.getElementById('status').innerText = "¡Correcto!";
                } else {
                    alert(`¡Error! "${data.name}" no cumple los requisitos.`);
                }
            }
        } catch (error) {
            alert("Error de conexión con el servidor de cartas.");
        }
        setTimeout(() => document.getElementById('status').innerText = "", 2000);
    }

    function verificar(card, cond) {
        if (cond.cat === "colors") {
            // Para cartas multicolores o incoloras
            return card.colors && card.colors.includes(cond.v);
        }
        if (cond.cat === "type_line") {
            return card.type_line.includes(cond.v);
        }
        return false;
    }

    window.onload = nuevoJuego;
</script>
</body>
</html>
