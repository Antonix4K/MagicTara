<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sudoku - El Gran Desafío</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #020617; color: white; text-align: center; }
        header { background: #1e293b; padding: 20px; border-bottom: 3px solid #1abc9c; position: relative; }
        .nav-back { position: absolute; top: 25px; left: 20px; color: #1abc9c; text-decoration: none; font-weight: bold; }
        
        .game-container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        #status { color: #f1c40f; font-size: 14px; height: 25px; margin-bottom: 10px; font-weight: bold; }

        .grid-layout {
            display: grid;
            grid-template-columns: 120px 220px 220px 220px;
            grid-template-rows: 120px 300px 300px 300px; /* Proporción de carta real */
            gap: 15px; justify-content: center;
        }

        .label { 
            display: flex; align-items: center; justify-content: center; 
            background: #1e293b; border: 2px solid #334155; border-radius: 12px;
            color: #1abc9c; font-weight: bold; font-size: 14px; padding: 10px;
            text-transform: uppercase; text-align: center;
        }

        .slot { 
            background: #0f172a; border: 2px dashed #334155; border-radius: 12px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .slot:hover { border-color: #1abc9c; background: #1e293b; box-shadow: 0 0 15px rgba(26, 188, 156, 0.2); }
        .slot.correct { border: 2px solid #2ecc71; cursor: default; background: #000; }
        
        /* CARTA ENTERA SIN RECORTAR */
        .slot img { width: 100%; height: 100%; object-fit: contain; animation: fadeIn 0.5s; }

        .controls { margin-top: 30px; display: flex; gap: 20px; justify-content: center; }
        .btn { 
            padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s;
        }
        .btn-refresh { background: #1abc9c; color: #020617; }
        .btn-help { background: #f1c40f; color: #020617; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="nav-back">← Volver al Inicio</a>
    <h1>Sudoku: Edición Maestra</h1>
</header>

<div class="game-container">
    <div id="status"></div>
    <div class="grid-layout" id="board">
        <div style="visibility: hidden;"></div>
        <div class="label" id="col-0">?</div>
        <div class="label" id="col-1">?</div>
        <div class="label" id="col-2">?</div>

        <div class="label" id="row-0">?</div>
        <div id="cell-0-0" class="slot" onclick="validarCarta(0,0)"></div>
        <div id="cell-0-1" class="slot" onclick="validarCarta(0,1)"></div>
        <div id="cell-0-2" class="slot" onclick="validarCarta(0,2)"></div>

        <div class="label" id="row-1">?</div>
        <div id="cell-1-0" class="slot" onclick="validarCarta(1,0)"></div>
        <div id="cell-1-1" class="slot" onclick="validarCarta(1,1)"></div>
        <div id="cell-1-2" class="slot" onclick="validarCarta(1,2)"></div>

        <div class="label" id="row-2">?</div>
        <div id="cell-2-0" class="slot" onclick="validarCarta(2,0)"></div>
        <div id="cell-2-1" class="slot" onclick="validarCarta(2,1)"></div>
        <div id="cell-2-2" class="slot" onclick="validarCarta(2,2)"></div>
    </div>
    
    <div class="controls">
        <button class="btn btn-refresh" onclick="nuevoJuego()">Nuevo Tablero</button>
        <button class="btn btn-help" onclick="obtenerAyuda()">¿Necesitas una pista?</button>
    </div>
</div>

<script>
    const condiciones = [
        { t: "Color: Verde", cat: "colors", v: "G" },
        { t: "Color: Blanco", cat: "colors", v: "W" },
        { t: "Color: Negro", cat: "colors", v: "B" },
        { t: "Color: Rojo", cat: "colors", v: "R" },
        { t: "Color: Azul", cat: "colors", v: "U" },
        { t: "Tipo: Criatura", cat: "type_line", v: "Creature" },
        { t: "Tipo: Artefacto", cat: "type_line", v: "Artifact" },
        { t: "Tipo: Hechizo", cat: "type_line", v: "Instant" },
        { t: "Coste: 3 o menos", cat: "cmc", v: "low" },
        { t: "Coste: 4 o más", cat: "cmc", v: "high" },
        { t: "Habilidad: Vuela", cat: "oracle_text", v: "Flying" },
        { t: "Habilidad: Arrolla", cat: "oracle_text", v: "Trample" },
        { t: "Legendaria", cat: "type_line", v: "Legendary" }
    ];

    let filas = [], columnas = [];

    function nuevoJuego() {
        const shuffle = [...condiciones].sort(() => 0.5 - Math.random());
        filas = [shuffle[0], shuffle[1], shuffle[2]];
        columnas = [shuffle[3], shuffle[4], shuffle[5]];

        for(let i=0; i<3; i++) {
            document.getElementById(`row-${i}`).innerText = filas[i].t;
            document.getElementById(`col-${i}`).innerText = columnas[i].t;
            for(let j=0; j<3; j++) {
                let c = document.getElementById(`cell-${i}-${j}`);
                c.innerHTML = ""; c.className = "slot";
            }
        }
        document.getElementById('status').innerText = "Tablero listo. ¡Buena suerte!";
    }

    async function validarCarta(r, c) {
        const celda = document.getElementById(`cell-${r}-${c}`);
        if (celda.classList.contains('correct')) return;

        const nombre = prompt(`Busca una carta que cumpla:\n- ${filas[r].t}\n- ${columnas[c].t}`);
        if (!nombre) return;

        document.getElementById('status').innerText = "Buscando en el multiverso...";

        try {
            const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(nombre)}`);
            const data = await res.json();

            if (data.status === 404) {
                alert("No conozco esa carta. Prueba con otro nombre.");
            } else {
                if (verificar(data, filas[r]) && verificar(data, columnas[c])) {
                    celda.innerHTML = `<img src="${data.image_uris.normal}">`;
                    celda.classList.add('correct');
                    document.getElementById('status').innerText = "¡Acierto! Es una excelente elección.";
                } else {
                    alert(`"${data.name}" no cumple los requisitos de esta celda.`);
                }
            }
        } catch (e) {
            alert("Error al conectar con Scryfall.");
        }
    }

    function verificar(card, cond) {
        if (cond.cat === "colors") return card.colors && card.colors.includes(cond.v);
        if (cond.cat === "type_line") return card.type_line.includes(cond.v);
        if (cond.cat === "oracle_text") return card.oracle_text && card.oracle_text.includes(cond.v);
        if (cond.cat === "cmc") return cond.v === "low" ? card.cmc <= 3 : card.cmc >= 4;
        return false;
    }

    async function obtenerAyuda() {
        alert("Pista: Puedes buscar cartas famosas como 'Llanowar Elves' para Verde, 'Counterspell' para Azul o 'Sol Ring' para Artefactos.");
        document.getElementById('status').innerText = "Pista lanzada. ¡Sigue intentándolo!";
    }

    window.onload = nuevoJuego;
</script>
</body>
</html>
