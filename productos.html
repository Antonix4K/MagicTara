<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Productos - Registro TCG</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; }
        header { background: #1f1f1f; padding: 20px; text-align: center; border-bottom: 3px solid #1abc9c; }
        .nav-back { padding: 10px; display: block; color: #1abc9c; text-decoration: none; font-weight: bold; }
        
        .container { width: 90%; margin: auto; padding: 20px; }
        
        /* Estilo de la caja de producto */
        .producto-card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        .producto-header { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .badge { background: #e74c3c; padding: 5px 10px; border-radius: 5px; font-size: 12px; }

        /* Lista de cartas obtenidas */
        .lista-cartas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .carta-item {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .carta-item:hover { transform: scale(1.05); background: #333; border: 1px solid #1abc9c; }
        .raridad-rara { color: #f1c40f; font-weight: bold; } /* Dorado para raras */
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="nav-back">← Volver al Inicio</a>
        <h1>Inventario de Productos</h1>
    </header>

    <div class="container">
        
        <div class="producto-card">
            <div class="producto-header">
                <img src="https://via.placeholder.com/80x80?text=BOX" alt="Caja Cimientos">
                <div>
                    <h2>Caja de Principiantes: Cimientos</h2>
                    <span class="badge">Abierto el: 08/03/2026</span>
                </div>
            </div>

            <h3>Cartas Destacadas Obtenidas:</h3>
            <div class="lista-cartas">
                <div class="carta-item">
                    <p>Llanura Artística</p>
                    <small>Común</small>
                </div>
                <div class="carta-item">
                    <p class="raridad-rara">Dragón de Cimientos</p>
                    <small>Rara Mítica</small>
                </div>
                <div class="carta-item">
                    <p>Crecimiento Gigante</p>
                    <small>Infrecuente</small>
                </div>
                </div>
        </div>

    </div>

    <footer style="text-align: center; padding: 40px; color: #666;">
        <p>Añadiendo cartas a la colección paso a paso...</p>
    </footer>

</body>
</html>
