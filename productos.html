<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Colecciones - TCG</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #121212; 
            color: white; 
            text-align: center;
        }
        
        .container { 
            width: 90%; 
            max-width: 1000px; 
            margin: auto; 
            padding: 40px 20px; 
        }

        /* Configuración para filas de tres */
        .secciones {
            display: grid;
            /* Aquí definimos que las columnas ocupen una fracción equitativa (1fr) */
            /* El minmax asegura que si la pantalla es muy pequeña, no se vean diminutos */
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; /* Espacio entre los recuadros */
            margin-top: 30px;
        }

        /* Estilo de las tarjetas de producto */
        .card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #1abc9c;
            background: #252525;
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 9; /* Mantiene las fotos con el mismo tamaño */
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 16px;
            margin: 10px 0;
            color: #1abc9c;
        }

        .card p {
            font-size: 13px;
            color: #bbb;
        }

        /* Ajuste para móviles: si la pantalla es pequeña, se ven de 1 en 1 o de 2 en 2 */
        @media (max-width: 768px) {
            .secciones {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>
