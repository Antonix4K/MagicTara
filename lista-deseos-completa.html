<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuario - Lista de Deseos Completa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: white; }
        header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 3px solid #1abc9c; }
        .nav-back { padding: 10px; color: #1abc9c; text-decoration: none; font-weight: bold; display: inline-block; }
        .container { width: 95%; max-width: 1400px; margin: auto; padding: 20px; }
        
        .main-layout { display: flex; gap: 30px; align-items: flex-start; }
        .col-cartas { flex: 1; }

        /* FILTROS */
        .filtros-group { 
            background: rgba(30, 41, 59, 0.5); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .filter-label { display: block; margin-bottom: 10px; color: #1abc9c; font-weight: bold; font-size: 14px; }
        .btn-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        
        .btn-f { 
            background: #0f172a; color: #fff; border: 1px solid #334155; 
            padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .btn-f:hover { border-color: #1abc9c; color: #1abc9c; }
        .btn-f.active { background: #1abc9c; color: #0f172a; border-color: #1abc9c; }

        /* GRID DE CARTAS */
        .lista-cartas { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
        }
        .carta-item { 
            background: #1e293b; border: 1px dashed #475569; border-radius: 8px;
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; transition: 0.3s; padding: 10px;
        }
        .carta-item:hover { border-style: solid; border-color: #1abc9c; transform: translateY(-3px); }

        /* VISOR LATERAL */
        .visor-lateral {
            width: 320px; position: sticky; top: 10px; background: #1e293b;
            border: 2px solid #1abc9c; border-radius: 15px; padding: 20px;
            text-align: center; height: auto; max-height: 90vh; overflow-y: auto;
        }
        #imagen-visor { width: 100%; border-radius: 10px; display: none; margin-bottom: 15px; }
        #desc-visor { text-align: left; font-size: 14px; color: #cbd5e1; line-height: 1.5; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .visor-lateral { width: 100%; position: static; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="nav-back">← Volver al Inicio</a>
    <h1>Códice de Deseos</h1>
</header>

<div class="container">
    <div class="main-layout">
        
        <div class="col-cartas">
            <div class="filtros-group">
                <span class="filter-label">Filtrar por Tipo:</span>
                <div class="btn-container">
                    <button class="btn-f" onclick="filtrar('tipo', 'todas')">Todas</button>
                    <button class="btn-f" onclick="filtrar('tipo', 'Criatura')">Criaturas</button>
                    <button class="btn-f" onclick="filtrar('tipo', 'Tierra')">Tierras</button>
                    <button class="btn-f" onclick="filtrar('tipo', 'Hechizo')">Hechizos</button>
                    <button class="btn-f" onclick="filtrar('tipo', 'Artefacto')">Artefactos</button>
                    <button class="btn-f" onclick="filtrar('tipo', 'Encantamiento')">Encantamiento</button>
                </div>

                <span class="filter-label">Filtrar por Color:</span>
                <div class="btn-container">
                    <button class="btn-f" onclick="filtrar('color', 'todas')">Todos</button>
                    <button class="btn-f" style="color:#fff;" onclick="filtrar('color', 'Blanco')">Blanco</button>
                    <button class="btn-f" style="color:#3b82f6;" onclick="filtrar('color', 'Azul')">Azul</button>
                    <button class="btn-f" style="color:#ef4444;" onclick="filtrar('color', 'Rojo')">Rojo</button>
                    <button class="btn-f" style="color:#22c55e;" onclick="filtrar('color', 'Verde')">Verde</button>
                    <button class="btn-f" style="color:#3e2142;" onclick="filtrar('color', 'Negro')">Negro</button>
                    <button class="btn-f" style="color:#aaa;" onclick="filtrar('color', 'Incoloro')">Incoloro</button>
                </div>
            </div>

            <div class="lista-cartas" id="grid-deseos">
                
                <div class="carta-item" data-tipo="Criatura" data-color="Verde" 
                     onmouseover="mostrar('https://gatherer-static.wizards.com/Cards/medium/EBF3670D7B3EDFCD298AE3D88B827EEEB90D7CC56427445674B1ED962FD4123D.webp', 'Edu Espinoso, sembrador de púas', 'CriaturaLlegendaria - Druida Planta','Poder: 2/2. Añade contadores mediante tierras y los duplica.')">
                    <p>Edu Espinso, sembrador de púas</p>
                </div>

                <div class="carta-item" data-tipo="Encantamiento" data-color="Negro" 
                     onmouseover="mostrar('https://www.cardtrader.com/uploads/blueprints/image/26576/show_megrim-eighth-edition.jpg', 'Jaqueca', 'Encantamiento', 'Quita vidas al descartar cartas.')">
                    <p>Jaqueca</p>
                </div>

                <div class="carta-item" data-tipo="Artefacto" data-color="Incoloro" 
                     onmouseover="mostrar('https://cards.scryfall.io/small/front/7/3/73bc4196-d54f-44cb-9797-11cb19b54308.jpg?1562819022', 'Urna dorada', 'Artefacto', 'Acumula vidas por turnos.')">
                    <p>Urna dorada</p>
                </div>

                </div>
        </div>

        <div class="visor-lateral">
            <p id="ins">Pasa el ratón para inspeccionar</p>
            <img id="imagen-visor" src="">
            <h3 id="titulo-visor"></h3>
            <p id="tipo-visor" style="color:#1abc9c; font-weight:bold;"></p>
            <p id="desc-visor"></p>
        </div>

    </div>
</div>

<script>
    function mostrar(img, tit, tipo, desc) {
        document.getElementById('ins').style.display = 'none';
        const imagen = document.getElementById('imagen-visor');
        imagen.src = img;
        imagen.style.display = 'block';
        document.getElementById('titulo-visor').innerText = tit;
        document.getElementById('tipo-visor').innerText = tipo;
        document.getElementById('desc-visor').innerText = desc;
    }

    let filtroActual = { tipo: 'todas', color: 'todas' };

    function filtrar(categoria, valor) {
        filtroActual[categoria] = valor;
        const cartas = document.querySelectorAll('.carta-item');

        cartas.forEach(c => {
            const tMatch = filtroActual.tipo === 'todas' || c.dataset.tipo === filtroActual.tipo;
            const cMatch = filtroActual.color === 'todas' || c.dataset.color === filtroActual.color;
            
            c.style.display = (tMatch && cMatch) ? 'flex' : 'none';
        });

        // Feedback visual en botones
        event.target.parentElement.querySelectorAll('.btn-f').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }
</script>
</body>
</html>
