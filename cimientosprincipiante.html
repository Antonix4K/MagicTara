<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja Cimientos - Mi Inventario</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #121212; color: white; }
        header { background: #1f1f1f; padding: 20px; text-align: center; border-bottom: 3px solid #1abc9c; }
        .nav-back { padding: 10px; color: #1abc9c; text-decoration: none; font-weight: bold; display: inline-block; }
        
        .container { width: 95%; max-width: 1400px; margin: auto; padding: 20px; }

        /* DISEÑO DE DOS COLUMNAS */
        .main-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* Columna de las cartas (Izquierda) */
        .col-cartas {
            flex: 1;
        }

        /* Panel del Visor (Derecha) */
        .visor-lateral {
            width: 320px;
            position: sticky;
            top: 20px;
            background: #1e1e1e;
            border: 2px solid #1abc9c;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .visor-lateral img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none; /* Se activa con JS */
        }

        .instrucciones-visor {
            color: #666;
            font-style: italic;
        }

        /* Estilos de las cartas */
        .grupo-titulo {
            background: #1abc9c;
            color: #121212;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 40px;
            font-size: 18px;
            display: inline-block;
        }

        .lista-cartas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .carta-item {
            background: #2a2a2a;
            border-radius: 8px;
            border: 1px solid #444;
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .carta-item:hover {
            border-color: #1abc9c;
            background: #333;
            transform: translateY(-5px);
        }

        #buscador {
            width: 100%; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #1abc9c; 
            background: #1e1e1e; 
            color: white; 
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .raridad-rara { color: #f1c40f; }

        /* Responsive para móviles */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .visor-lateral { width: 100%; position: relative; top: 0; min-height: auto; }
        }
    </style>
</head>
<body>

<header>
    <a href="productos.html" class="nav-back">← Volver a Colecciones</a>
    <h1>Caja de Principiantes: Cimientos</h1>
</header>

<div class="container">
    
    <div class="main-layout">
        
        <div class="col-cartas">
            <input type="text" id="buscador" placeholder="Buscar carta en toda la caja...">

            <div class="grupo-titulo">Mazo de felinos</div>
            <div class="lista-cartas">
                
                <div class="carta-item" onmouseover="mostrarCarta('https://media.wizards.com/2024/fdn/KJcVGY55Z3Bgi7/sp_f92a854ceb.png', 'Llanura (7)', 'Tierra Básica', 'Llanura básica, añade uno de mana blanco.')">
                    <p>Llanura (7)</p> 
                </div>

                <div class="carta-item" onmouseover="mostrarCarta('https://media.wizards.com/2024/fdn/KJcVGY55Z3Bgi7/sp_e392057302.png', 'Castigo de Elspeth', 'Instantáneo', 'Hace tres puntos de daño a la criatura atacante o defensora objetivo. Si fuera a morir, exíliala.')">
                    <p>Castigo de Elspeth</p>
                </div>

                <div class="carta-item" onmouseover="mostrarCarta('https://media.wizards.com/2024/fdn/KJcVGY55Z3Bgi7/sp_f8a68746dd.png', 'Cazacielos leonina', 'Criatura - Caballero felino', 'Poder: 2/2. Vuela.')">
                    <p>Cazacielos leonina</p>
                </div>

                <div class="carta-item" onmouseover="mostrarCarta('fotos/princ_cimientos/castigo_de_elspeth.png', 'Castigo de Elspeth', 'Instantáneo', 'Efecto de exilio.')"><p>Castigo de Elspeth</p></div>
                <div class="carta-item" onmouseover="mostrarCarta('fotos/princ_cimientos/castigo_de_elspeth.png', 'Castigo de Elspeth', 'Instantáneo', 'Efecto de exilio.')"><p>Castigo de Elspeth</p></div>
                <div class="carta-item" onmouseover="mostrarCarta('fotos/princ_cimientos/castigo_de_elspeth.png', 'Castigo de Elspeth', 'Instantáneo', 'Efecto de exilio.')"><p>Castigo de Elspeth</p></div>

            </div>

            <div class="grupo-titulo">Grupo 2: Bosque</div>
            <div class="lista-cartas">
                <div class="carta-item" onmouseover="mostrarCarta('fotos/princ_cimientos/crecimiento.jpg', 'Crecimiento Gigante', 'Instantáneo', 'La criatura objetivo obtiene +3/+3 hasta el final del turno.')">
                    <p>Crecimiento Gigante</p>
                </div>
            </div>
        </div>

        <div class="visor-lateral" id="visor">
            <div id="instrucciones" class="instrucciones-visor">Pasa el ratón sobre una carta para ver los detalles</div>
            <img id="img-visor" src="" alt="Carta seleccionada">
            <h2 id="titulo-visor" style="color: #1abc9c; margin-bottom: 5px;"></h2>
            <p id="tipo-visor" style="font-weight: bold; color: #ccc; margin-top: 0;"></p>
            <hr id="separador-visor" style="border: 0; border-top: 1px solid #444; width: 80%; display:none;">
            <p id="desc-visor" style="font-size: 14px; padding: 0 10px;"></p>
        </div>

    </div>
</div>

<script>
    // FUNCIÓN PARA EL VISOR
    function mostrarCarta(img, titulo, tipo, desc) {
        document.getElementById('instrucciones').style.display = 'none';
        
        const imagen = document.getElementById('img-visor');
        imagen.src = img;
        imagen.style.display = 'block';
        
        document.getElementById('titulo-visor').innerText = titulo;
        document.getElementById('tipo-visor').innerText = tipo;
        document.getElementById('desc-visor').innerText = desc;
        document.getElementById('separador-visor').style.display = 'block';
    }

    // BUSCADOR
    const buscador = document.getElementById('buscador');
    buscador.addEventListener('keyup', (e) => {
        const textoBusqueda = e.target.value.toLowerCase();
        const cartas = document.querySelectorAll('.carta-item');

        cartas.forEach(carta => {
            const nombreCarta = carta.querySelector('p').textContent.toLowerCase();
            if (nombreCarta.includes(textoBusqueda)) {
                carta.style.display = 'flex';
            } else {
                carta.style.display = 'none';
            }
        });
    });
</script>

</body>
</html>
